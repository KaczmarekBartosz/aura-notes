<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Aura Notes</title>
    <style>
      :root{
        --bg:#f3f7ff; --glass:#ffffffcf; --glass2:#fffffff3; --text:#0f1b33; --muted:#5f6f8c;
        --line:#d9e4ff; --chip:#ecf2ff; --chipOn:#dfeaff; --accent:#4f7cff;
      }
      *{box-sizing:border-box}
      html,body{width:100%;overflow-x:hidden}
      body{
        margin:0; color:var(--text);
        font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
        background:
          radial-gradient(1100px 500px at -10% -20%, #dbe8ff 0%, transparent 60%),
          radial-gradient(1100px 500px at 120% 10%, #e8ddff 0%, transparent 60%),
          linear-gradient(180deg,#f8fbff 0%, #eef4ff 100%);
      }
      .wrap{max-width:1240px;margin:0 auto;padding:12px}
      .glass{background:var(--glass);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%);box-shadow:0 12px 34px rgba(76,104,168,.10)}
      .top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
      .pill{font-size:12px;padding:6px 10px;border-radius:999px;background:var(--chip);border:1px solid var(--line);color:#2f4678}
      .chips,.views{display:flex;gap:8px;overflow:auto;padding-bottom:4px}
      .chip,.viewBtn{white-space:nowrap;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:var(--chip);color:#2f4678;font-size:12px;cursor:pointer}
      .chip.on,.viewBtn.on{background:var(--chipOn);border-color:#b9ccff;color:#1f3470;font-weight:600}
      .grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
      .panel{padding:10px}
      input,select,button{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--glass2);font-size:16px;color:var(--text)}
      .controls{display:grid;gap:8px}
      .list{margin-top:10px;max-height:52vh;overflow:auto;border-top:1px solid var(--line)}
      .item{padding:12px;border-bottom:1px solid var(--line);cursor:pointer}
      .item.active{background:#eef4ff}
      .item h4{margin:0 0 4px;font-size:15px}
      .item p{margin:0;color:var(--muted);font-size:12px}
      .meta{font-size:11px;color:var(--muted);margin-top:6px}
      .viewer{padding:12px;max-height:62vh;overflow:auto}
      .viewer pre{white-space:pre-wrap;line-height:1.5;font-size:15px;margin:8px 0 0;word-break:break-word}

      /* app-like mobile nav */
      .mobileTabs{display:flex;gap:8px;margin-top:10px}
      .tabBtn{flex:1;padding:10px;border-radius:12px;border:1px solid var(--line);background:var(--chip);font-weight:600}
      .tabBtn.on{background:var(--chipOn)}
      .mobileOnly{display:block}
      .desktopOnly{display:none}
      .hidden{display:none !important}

      .lock{position:fixed;inset:0;background:#eff4ffcc;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter: blur(8px)}

      @media (min-width:980px){
        .mobileOnly{display:none}
        .desktopOnly{display:block}
        .grid{grid-template-columns:390px 1fr}
        .list{max-height:74vh}
        .viewer{max-height:80vh}
      }
    </style>
  </head>
  <body>
    <div id="lock" class="lock hidden">
      <div class="glass panel" style="width:min(420px,100%)">
        <h2 style="margin:0 0 8px">Aura Notes — prywatny dostęp</h2>
        <p style="color:var(--muted);margin-top:0">Podaj hasło, żeby odblokować notatnik.</p>
        <input id="pw" type="password" placeholder="Hasło" />
        <div style="height:8px"></div>
        <button id="unlock" style="background:var(--accent);color:#fff;border-color:#4a75f0">Odblokuj</button>
        <p id="pwErr" style="color:#cc3b3b;font-size:12px;display:none">Nieprawidłowe hasło.</p>
      </div>
    </div>

    <div class="wrap">
      <div class="top">
        <h1 style="margin:0;font-size:20px">Aura Notes</h1>
        <span id="count" class="pill">0 notatek</span>
        <span id="latestGlobal" class="pill">Najnowsza aktualizacja: —</span>
      </div>

      <div class="views" id="views">
        <button class="viewBtn" data-view="gold">🔥 Golden Protocols</button>
        <button class="viewBtn" data-view="fitness">💪 Fitness + Peptydy</button>
        <button class="viewBtn" data-view="taste">🧠 Taste</button>
        <button class="viewBtn" data-view="recent">🆕 Ostatnie 7 dni</button>
        <button class="viewBtn" data-view="all">📚 Wszystko</button>
      </div>

      <div class="chips" id="categories"></div>

      <div class="mobileTabs mobileOnly">
        <button id="tabList" class="tabBtn on">Lista</button>
        <button id="tabRead" class="tabBtn">Czytnik</button>
      </div>

      <div class="grid">
        <section id="listPane" class="glass panel">
          <div class="controls">
            <input id="q" placeholder="Szukaj: gold, peptydy, taste, cron..." />
            <select id="folder">
              <option value="">Wszystkie foldery</option>
              <option value="memory">memory</option>
              <option value="outputs">outputs</option>
            </select>
            <select id="tag"><option value="">Wszystkie tagi</option></select>
          </div>
          <div class="list" id="list"></div>
        </section>

        <section id="readPane" class="glass viewer">
          <div id="meta" class="meta">Wybierz notatkę z lewej.</div>
          <pre id="content"></pre>
        </section>
      </div>
    </div>

    <script>
      const CAT={all:'Wszystko','golden-protocols':'Golden Protocols','fitness-health':'Fitness / Health',taste:'Taste','cron-sync':'Cron / Sync','daily-log':'Daily log',other:'Inne'};
      const state={notes:[],filtered:[],selected:null,category:'golden-protocols',forceRecent:false,auth:{enabled:false,sha256:null}};
      const els={
        list:document.getElementById('list'),q:document.getElementById('q'),folder:document.getElementById('folder'),tag:document.getElementById('tag'),
        content:document.getElementById('content'),meta:document.getElementById('meta'),count:document.getElementById('count'),latestGlobal:document.getElementById('latestGlobal'),
        lock:document.getElementById('lock'),unlock:document.getElementById('unlock'),pw:document.getElementById('pw'),pwErr:document.getElementById('pwErr'),
        categories:document.getElementById('categories'),views:document.getElementById('views'),listPane:document.getElementById('listPane'),readPane:document.getElementById('readPane'),
        tabList:document.getElementById('tabList'),tabRead:document.getElementById('tabRead')
      };
      const fmt=d=>new Date(d).toLocaleString('pl-PL',{dateStyle:'short',timeStyle:'short'});
      const daysAgo=n=>new Date(Date.now()-n*86400000);
      const isMobile=()=>window.matchMedia('(max-width: 979px)').matches;

      async function sha256(text){const data=new TextEncoder().encode(text);const hash=await crypto.subtle.digest('SHA-256',data);return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');}

      function setMobileTab(tab){
        if(!isMobile()) return;
        const listOn=tab==='list';
        els.tabList.classList.toggle('on',listOn);
        els.tabRead.classList.toggle('on',!listOn);
        els.listPane.classList.toggle('hidden',!listOn);
        els.readPane.classList.toggle('hidden',listOn);
      }

      function renderCategories(){
        const available=new Set(state.notes.map(n=>n.category));
        const order=['all','golden-protocols','fitness-health','taste','cron-sync','daily-log','other'];
        els.categories.innerHTML=order.filter(c=>c==='all'||available.has(c)).map(c=>`<button class="chip ${state.category===c?'on':''}" data-cat="${c}">${CAT[c]||c}</button>`).join('');
        els.categories.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.category=b.dataset.cat;state.forceRecent=false;state.selected=null;renderCategories();renderList();});
      }

      function setActiveView(view){
        els.views.querySelectorAll('.viewBtn').forEach(btn=>btn.classList.toggle('on',btn.dataset.view===view));
      }

      function applyView(view){
        state.forceRecent=false;
        if(view==='gold'){state.category='golden-protocols';els.q.value='';els.folder.value='';els.tag.value='';}
        if(view==='fitness'){state.category='fitness-health';els.q.value='peptyd peptide fitness';els.folder.value='';els.tag.value='';}
        if(view==='taste'){state.category='taste';els.q.value='';els.folder.value='';els.tag.value='';}
        if(view==='all'){state.category='all';els.q.value='';els.folder.value='';els.tag.value='';}
        if(view==='recent'){state.category='all';state.forceRecent=true;els.q.value='';els.folder.value='';els.tag.value='';}
        state.selected=null;
        setActiveView(view);
        renderCategories();
        renderList();
      }

      function renderList(){
        const q=els.q.value.trim().toLowerCase(),folder=els.folder.value,tag=els.tag.value;
        let base=state.notes;
        if(state.forceRecent) base=base.filter(n=>new Date(n.updatedAt)>=daysAgo(7));
        state.filtered=base.filter(n=>{
          if(!state.forceRecent&&state.category!=='all'&&n.category!==state.category) return false;
          if(folder&&n.folder!==folder) return false;
          if(tag&&!(n.tags||[]).includes(tag)) return false;
          if(!q) return true;
          return (n.title+' '+n.path+' '+(n.excerpt||'')+' '+(n.tags||[]).join(' ')+' '+(n.category||'')).toLowerCase().includes(q);
        });

        els.list.innerHTML=state.filtered.map(n=>`<div class="item ${state.selected===n.id?'active':''}" data-id="${n.id}"><h4>${n.title}</h4><p>${n.excerpt||''}</p><div class="meta">${n.path} • ${fmt(n.updatedAt)} • ${CAT[n.category]||n.category}</div></div>`).join('');
        els.count.textContent=`${state.filtered.length} / ${state.notes.length} notatek`;
        els.list.querySelectorAll('.item').forEach(el=>el.onclick=()=>openNote(el.dataset.id));
        if(state.filtered.length&&!state.selected) openNote(state.filtered[0].id);
        if(!state.filtered.length){els.meta.textContent='Brak wyników dla aktualnych filtrów.';els.content.textContent='';}
      }

      function openNote(id){
        const n=state.notes.find(x=>x.id===id); if(!n) return;
        state.selected=n.id;
        els.meta.textContent=`Plik: ${n.path} • Ostatnia aktualizacja: ${fmt(n.updatedAt)} • ${CAT[n.category]||n.category}${(n.tags||[]).length?' • #'+n.tags.join(' #'):''}`;
        els.content.textContent=n.content;
        if(isMobile()) setMobileTab('read');
        renderList();
      }

      async function boot(){
        const res=await fetch('./notes-index.json',{cache:'no-store'});
        const data=await res.json();
        state.auth=data.auth||{enabled:false};
        els.latestGlobal.textContent=`Najnowsza aktualizacja: ${data.latestUpdatedAt?fmt(data.latestUpdatedAt):'—'}`;

        if(state.auth.enabled){
          els.lock.classList.remove('hidden');
          els.unlock.onclick=async()=>{const attempt=await sha256(els.pw.value);if(attempt===state.auth.sha256){sessionStorage.setItem('aura_ok','1');els.lock.classList.add('hidden');}else{els.pwErr.style.display='block';}};
          if(sessionStorage.getItem('aura_ok')==='1') els.lock.classList.add('hidden');
        }

        state.notes=data.notes||[];
        const tags=[...new Set(state.notes.flatMap(n=>n.tags||[]))].sort();
        for(const t of tags){const o=document.createElement('option');o.value=t;o.textContent=`#${t}`;els.tag.appendChild(o);}

        [els.q,els.folder,els.tag].forEach(el=>el.addEventListener('input',()=>renderList()));
        els.views.querySelectorAll('.viewBtn').forEach(btn=>btn.addEventListener('click',()=>applyView(btn.dataset.view)));
        els.tabList.onclick=()=>setMobileTab('list');
        els.tabRead.onclick=()=>setMobileTab('read');

        window.addEventListener('resize',()=>{ if(!isMobile()){ els.listPane.classList.remove('hidden'); els.readPane.classList.remove('hidden'); } else { setMobileTab('list'); } });

        renderCategories();
        applyView('gold');
        setMobileTab('list');
      }
      boot();
    </script>
  </body>
</html>
