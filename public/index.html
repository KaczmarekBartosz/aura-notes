<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Aura Notes</title>
    <style>
      :root{
        --bg:#eef4ff; --bg2:#f8fbff; --glass:#ffffffd6; --glassStrong:#fffffff2;
        --text:#0f1b33; --muted:#607294; --line:#d7e4ff; --accent:#3771ff;
        --chip:#edf3ff; --chipOn:#dce9ff; --ok:#1f9d61;
      }
      *{box-sizing:border-box;max-width:100%;min-width:0}
      html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden!important;overscroll-behavior-x:none}
      body{
        font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
        color:var(--text);
        background:
          radial-gradient(1200px 600px at -10% -20%, #dfeaff 0%, transparent 62%),
          radial-gradient(1200px 600px at 110% 0%, #ece2ff 0%, transparent 60%),
          linear-gradient(180deg,var(--bg2) 0%, var(--bg) 100%);
      }
      .app{max-width:1280px;width:100%;margin:0 auto;padding:12px;overflow-x:clip;min-width:0}
      .glass{background:var(--glass);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);box-shadow:0 16px 42px rgba(69,97,160,.10)}
      .top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
      .pill{padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-size:12px;color:#2c4679}
      .title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:0}

      .dashboard{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px}
      .card{padding:10px 12px}
      .kpi{font-size:20px;font-weight:800;line-height:1.1}
      .label{font-size:12px;color:var(--muted)}

      .scrollRow{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;scrollbar-width:none;overscroll-behavior-x:contain}
      .scrollRow::-webkit-scrollbar{display:none}
      .chip,.viewBtn{white-space:nowrap;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-size:12px;color:#2d4779;cursor:pointer}
      .chip.on,.viewBtn.on{background:var(--chipOn);border-color:#b9cfff;font-weight:700;color:#1f3c73}

      .layout{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;min-width:0;max-width:100%}
      .left,.right{min-width:0}
      .panel{padding:10px}
      .controls{display:grid;gap:8px}
      input,select,button{width:100%;min-width:0;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--glassStrong);font-size:16px;color:var(--text)}
      button{cursor:pointer}
      .controls2{display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:0}.controls2>*{min-width:0}

      .list{margin-top:10px;max-height:50vh;overflow:auto;border-top:1px solid var(--line)}
      .item{padding:12px;border-bottom:1px solid var(--line);cursor:pointer}
      .item.active{background:#edf4ff}
      .itemTop{display:flex;gap:8px;align-items:center}
      .item h4{margin:0;font-size:15px;flex:1;min-width:0}
      .item p{margin:4px 0 0;color:var(--muted);font-size:12px}
      .meta{margin-top:6px;font-size:11px;color:var(--muted);word-break:break-word;overflow-wrap:anywhere}
      .mini{font-size:11px;padding:2px 8px;border-radius:999px;background:#edf3ff;border:1px solid var(--line);color:#31548f}

      .reader{padding:0;max-height:68vh;overflow:auto;min-width:0}
      .readerTop{position:sticky;top:0;z-index:5;background:var(--glassStrong);border-bottom:1px solid var(--line);padding:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:0;overflow-x:hidden}
      .readerTop button{width:auto;padding:8px 10px;font-size:13px}
      .progress{height:4px;background:#dbe7ff;position:relative}
      .progress > span{position:absolute;left:0;top:0;bottom:0;background:var(--accent);width:0%}
      .content{padding:14px}
      .md{font-size:17px;line-height:1.65;word-break:break-word;overflow-wrap:anywhere}
      .md *{max-width:100%;overflow-wrap:anywhere}
      .md h1,.md h2,.md h3{line-height:1.25;letter-spacing:-.01em}
      .md pre{background:#edf3ff;padding:10px;border-radius:10px;max-width:100%;overflow-x:auto;overflow-y:hidden}
      .md code{background:#edf3ff;padding:2px 6px;border-radius:6px}
      .md blockquote{border-left:3px solid #a8c3ff;padding-left:10px;color:#36507f}
      .md table{display:block;max-width:100%;overflow-x:auto}

      .mobileTabs{display:flex;gap:8px;margin-top:10px;max-width:100%;overflow:hidden}
      .tab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--line);background:var(--chip);font-weight:700}
      .tab.on{background:var(--chipOn)}
      .mobileOnly{display:block}
      .hidden{display:none!important}

      .fab{position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:20;width:auto;padding:12px 14px;border-radius:999px;background:var(--accent);color:#fff;border:0;box-shadow:0 12px 26px rgba(55,113,255,.35)}

      .lock{position:fixed;inset:0;background:#eef5ffcc;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:16px}

      @media (max-width: 999px){#noteMeta{display:none}}
            @media (max-width: 999px){
        .scrollRow{display:grid;grid-template-columns:1fr 1fr;overflow:visible;gap:8px}
        .scrollRow .viewBtn,.scrollRow .chip{white-space:normal;text-align:center;width:100%}
        #views{grid-template-columns:1fr 1fr}
        #categories{grid-template-columns:1fr 1fr}
        .readerTop{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
        .readerTop button{width:100%}
      }
@media (min-width:1000px){
        .dashboard{grid-template-columns:repeat(4,minmax(0,1fr))}
        .mobileOnly{display:none}
        .layout{grid-template-columns:410px 1fr}
        .list{max-height:73vh}
        .reader{max-height:82vh}
      }
    </style>
  </head>
  <body>
    <div id="lock" class="lock hidden">
      <div class="glass panel" style="width:min(420px,100%)">
        <h2 style="margin:0 0 8px">Aura Notes — prywatny dostęp</h2>
        <p style="margin-top:0;color:var(--muted)">Podaj hasło, żeby odblokować notatnik.</p>
        <input id="pw" type="password" placeholder="Hasło" />
        <div style="height:8px"></div>
        <button id="unlock" style="background:var(--accent);border-color:#2e63ea;color:white">Odblokuj</button>
        <p id="pwErr" style="display:none;color:#c83a3a;font-size:12px">Nieprawidłowe hasło.</p>
      </div>
    </div>

    <div class="app">
      <div class="top">
        <h1 class="title">Aura Notes</h1>
        <span id="latest" class="pill">Najnowsza aktualizacja: —</span>
      </div>

      <section class="dashboard">
        <div class="glass card"><div id="kpiAll" class="kpi">0</div><div class="label">Wszystkie notatki</div></div>
        <div class="glass card"><div id="kpiNew" class="kpi">0</div><div class="label">Nowe od ostatniej wizyty</div></div>
        <div class="glass card"><div id="kpiGold" class="kpi">0</div><div class="label">Golden Protocols</div></div>
        <div class="glass card"><div id="kpiFav" class="kpi">0</div><div class="label">Ulubione</div></div>
      </section>

      <div class="scrollRow" id="views">
        <button class="viewBtn" data-view="gold">🔥 Golden</button>
        <button class="viewBtn" data-view="fitness">💪 Fitness</button>
        <button class="viewBtn" data-view="taste">🧠 Taste</button>
        <button class="viewBtn" data-view="recent">🆕 7 dni</button>
        <button class="viewBtn" data-view="favorites">⭐ Favorites</button>
        <button class="viewBtn" data-view="all">📚 Wszystko</button>
      </div>

      <div class="scrollRow" id="categories"></div>

      <div class="mobileTabs mobileOnly">
        <button id="tabList" class="tab on">Lista</button>
        <button id="tabRead" class="tab">Czytnik</button>
      </div>

      <div class="layout">
        <section id="listPane" class="left glass panel">
          <div class="controls">
            <input id="q" placeholder="Szukaj: gold, peptide, taste, cron..." />
            <div class="controls2">
              <select id="folder"><option value="">Folder: wszystkie</option><option value="memory">memory</option><option value="outputs">outputs</option></select>
              <select id="tag"><option value="">Tag: wszystkie</option></select>
            </div>
            <div class="controls2">
              <select id="sort"><option value="new">Sort: najnowsze</option><option value="old">Sort: najstarsze</option><option value="az">Sort: A-Z</option></select>
              <select id="font"><option value="17">Czytnik: standard</option><option value="19">Czytnik: większy</option><option value="21">Czytnik: max</option></select>
            </div>
          </div>
          <div class="list" id="list"></div>
        </section>

        <section id="readPane" class="right glass reader">
          <div class="readerTop">
            <button id="prev">◀</button>
            <button id="next">▶</button>
            <button id="fav">⭐ Ulubione</button>
            <button id="focus">Focus</button>
            <button id="copyLink">Kopiuj link</button>
            <span id="noteMeta" class="pill">—</span>
          </div>
          <div class="progress"><span id="pbar"></span></div>
          <div class="content">
            <div id="meta" class="meta">Wybierz notatkę z listy.</div>
            <article id="content" class="md"></article>
          </div>
        </section>
      </div>
    </div>

    <button id="fabTop" class="fab mobileOnly">Lista</button>

    <script>
      const CAT={all:'Wszystko','golden-protocols':'Golden','fitness-health':'Fitness','taste':'Taste','cron-sync':'Cron','daily-log':'Daily','other':'Inne'};
      const LS='aura_notes_premium_v1';
      const state={notes:[],filtered:[],selected:null,category:'golden-protocols',view:'gold',forceRecent:false,focus:false,favorites:{}};
      const el=id=>document.getElementById(id);
      const els={latest:el('latest'),kpiAll:el('kpiAll'),kpiNew:el('kpiNew'),kpiGold:el('kpiGold'),kpiFav:el('kpiFav'),views:el('views'),categories:el('categories'),
        list:el('list'),q:el('q'),folder:el('folder'),tag:el('tag'),sort:el('sort'),font:el('font'),
        readPane:el('readPane'),listPane:el('listPane'),tabList:el('tabList'),tabRead:el('tabRead'),fabTop:el('fabTop'),
        prev:el('prev'),next:el('next'),fav:el('fav'),focus:el('focus'),copyLink:el('copyLink'),noteMeta:el('noteMeta'),pbar:el('pbar'),meta:el('meta'),content:el('content'),
        lock:el('lock'),pw:el('pw'),unlock:el('unlock'),pwErr:el('pwErr')};
      const fmt=d=>new Date(d).toLocaleString('pl-PL',{dateStyle:'short',timeStyle:'short'});
      const daysAgo=n=>new Date(Date.now()-n*86400000);
      const isMobile=()=>window.matchMedia('(max-width: 999px)').matches;

      const esc=s=>s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

      function mdToHtml(md){
        let t=esc(md);
        t=t.replace(/^###\s(.+)$/gm,'<h3>$1</h3>').replace(/^##\s(.+)$/gm,'<h2>$1</h2>').replace(/^#\s(.+)$/gm,'<h1>$1</h1>');
        t=t.replace(/^>\s(.+)$/gm,'<blockquote>$1</blockquote>');
        t=t.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
        t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
        t=t.replace(/\[([^\]]+)\]\((https?:[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
        t=t.replace(/^(\-\s.+(?:\n\-\s.+)*)/gm,m=>'<ul>'+m.split('\n').map(x=>'<li>'+x.replace(/^\-\s/,'')+'</li>').join('')+'</ul>');
        t=t.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
        return '<p>'+t+'</p>';
      }

      function save(){localStorage.setItem(LS,JSON.stringify({q:els.q.value,folder:els.folder.value,tag:els.tag.value,sort:els.sort.value,font:els.font.value,category:state.category,view:state.view,selected:state.selected,focus:state.focus,favorites:state.favorites}))}
      function load(){try{const s=JSON.parse(localStorage.getItem(LS)||'{}'); if(s.q!=null)els.q.value=s.q; if(s.folder!=null)els.folder.value=s.folder; if(s.tag!=null)els.tag.value=s.tag; if(s.sort)els.sort.value=s.sort; if(s.font)els.font.value=s.font; if(s.category)state.category=s.category; if(s.view)state.view=s.view; if(s.selected)state.selected=s.selected; state.focus=!!s.focus; state.favorites=s.favorites||{};}catch{}}

      function setMobileTab(tab){if(!isMobile())return; const listOn=tab==='list'; els.tabList.classList.toggle('on',listOn); els.tabRead.classList.toggle('on',!listOn); els.listPane.classList.toggle('hidden',!listOn); els.readPane.classList.toggle('hidden',listOn)}
      function setFocus(on){state.focus=on; els.listPane.classList.toggle('hidden',on); els.focus.textContent=on?'Wyłącz focus':'Focus'; if(on&&isMobile())setMobileTab('read'); save()}
      function setReaderFont(px){els.content.style.fontSize=px+'px'; save()}

      function renderCategories(){const set=new Set(state.notes.map(n=>n.category)); const order=['all','golden-protocols','fitness-health','taste','cron-sync','daily-log','other']; els.categories.innerHTML=order.filter(c=>c==='all'||set.has(c)).map(c=>`<button class="chip ${state.category===c?'on':''}" data-cat="${c}">${CAT[c]||c}</button>`).join(''); els.categories.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.category=b.dataset.cat;state.forceRecent=false;state.view='custom';renderViews();renderCategories();renderList();save()})}
      function renderViews(){els.views.querySelectorAll('.viewBtn').forEach(b=>b.classList.toggle('on',b.dataset.view===state.view));}

      function applyView(v){state.view=v; state.forceRecent=false; if(v==='gold'){state.category='golden-protocols';els.q.value='';els.folder.value='';els.tag.value=''} if(v==='fitness'){state.category='fitness-health';els.q.value='peptyd peptide fitness';els.folder.value='';els.tag.value=''} if(v==='taste'){state.category='taste';els.q.value='';els.folder.value='';els.tag.value=''} if(v==='all'){state.category='all';els.q.value='';els.folder.value='';els.tag.value=''} if(v==='recent'){state.category='all';state.forceRecent=true;els.q.value='';els.folder.value='';els.tag.value=''} if(v==='favorites'){state.category='all';els.q.value='';els.folder.value='';els.tag.value=''} state.selected=null; renderViews(); renderCategories(); renderList(); save();}

      function currentBase(){let base=[...state.notes]; if(state.forceRecent) base=base.filter(n=>new Date(n.updatedAt)>=daysAgo(7)); if(state.view==='favorites') base=base.filter(n=>state.favorites[n.id]); return base;}

      function renderList(){
        const q=els.q.value.trim().toLowerCase(), folder=els.folder.value, tag=els.tag.value;
        state.filtered=currentBase().filter(n=>{
          if(!state.forceRecent&&state.view!=='favorites'&&state.category!=='all'&&n.category!==state.category) return false;
          if(folder&&n.folder!==folder) return false;
          if(tag&&!(n.tags||[]).includes(tag)) return false;
          if(!q) return true;
          return (n.title+' '+n.path+' '+(n.excerpt||'')+' '+(n.tags||[]).join(' ')+' '+(n.category||'')).toLowerCase().includes(q);
        });
        if(els.sort.value==='new') state.filtered.sort((a,b)=>a.updatedAt<b.updatedAt?1:-1);
        if(els.sort.value==='old') state.filtered.sort((a,b)=>a.updatedAt>b.updatedAt?1:-1);
        if(els.sort.value==='az') state.filtered.sort((a,b)=>a.title.localeCompare(b.title,'pl'));

        els.list.innerHTML=state.filtered.map(n=>`<div class="item ${state.selected===n.id?'active':''}" data-id="${n.id}"><div class="itemTop"><h4>${n.title}</h4>${state.favorites[n.id]?'<span class="mini">★</span>':''}</div><p>${n.excerpt||''}</p><div class="meta">${n.path} • ${fmt(n.updatedAt)} • ${n.readingMinutes} min • ${CAT[n.category]||n.category}</div></div>`).join('');
        els.list.querySelectorAll('.item').forEach(it=>it.onclick=()=>openNote(it.dataset.id,true));
        if(state.filtered.length&&!state.selected) openNote(state.filtered[0].id,false);
        if(!state.filtered.length){els.meta.textContent='Brak wyników dla aktualnych filtrów.'; els.content.innerHTML='';}
        updateKPI();
      }

      function openNote(id,switchMobile){const n=state.notes.find(x=>x.id===id); if(!n) return; state.selected=n.id; location.hash=n.id; els.meta.textContent=`${n.path} • Ostatnia aktualizacja: ${fmt(n.updatedAt)} • ${n.words} słów`; els.noteMeta.textContent=`${n.readingMinutes} min`; els.content.innerHTML=mdToHtml(n.content); els.fav.textContent=state.favorites[n.id]?'★ Ulubione':'☆ Ulubione'; if(isMobile()&&switchMobile) setMobileTab('read'); renderList(); save();}
      function move(delta){if(!state.filtered.length) return; const i=state.filtered.findIndex(n=>n.id===state.selected); const ni=Math.max(0,Math.min(state.filtered.length-1,(i<0?0:i)+delta)); openNote(state.filtered[ni].id,false)}

      function updateKPI(){
        els.kpiAll.textContent=String(state.notes.length);
        els.kpiGold.textContent=String(state.notes.filter(n=>n.category==='golden-protocols').length);
        els.kpiFav.textContent=String(Object.keys(state.favorites).filter(k=>state.favorites[k]).length);
      }

      function bindReaderProgress(){
        const target=els.readPane;
        target.addEventListener('scroll',()=>{
          const h=target.scrollHeight-target.clientHeight;
          const pct=h<=0?0:(target.scrollTop/h)*100;
          els.pbar.style.width=pct.toFixed(1)+'%';
        },{passive:true});
      }

      async function fetchNotes(){
        const res=await fetch('/.netlify/functions/notes',{cache:'no-store',credentials:'include'});
        if(res.status===401) return {authRequired:true};
        const payload=await res.json();
        if(!payload.ok) throw new Error(payload.error||'Fetch failed');
        return {authRequired:false,data:payload.data};
      }

      async function authenticate(password){
        const res=await fetch('/.netlify/functions/auth',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});
        const payload=await res.json().catch(()=>({ok:false}));
        return Boolean(res.ok && payload.ok);
      }

      async function boot(){
        let bootData=null;
        let first=await fetchNotes();
        if(first.authRequired){
          els.lock.classList.remove('hidden');
          els.unlock.onclick=async()=>{
            els.pwErr.style.display='none';
            const ok=await authenticate(els.pw.value||'');
            if(!ok){els.pwErr.style.display='block'; return;}
            const second=await fetchNotes();
            if(second.authRequired||!second.data){els.pwErr.style.display='block'; return;}
            bootData=second.data;
            els.lock.classList.add('hidden');
            startApp(bootData);
          };
          return;
        }
        bootData=first.data;
        startApp(bootData);
      }

      function startApp(data){
        state.notes=data.notes||[];
        els.latest.textContent=`Najnowsza aktualizacja: ${data.latestUpdatedAt?fmt(data.latestUpdatedAt):'—'}`;

        const lastSeen=localStorage.getItem('aura_last_seen'); const newCount=state.notes.filter(n=>!lastSeen||new Date(n.updatedAt)>new Date(lastSeen)).length; els.kpiNew.textContent=String(newCount); localStorage.setItem('aura_last_seen',new Date().toISOString());

        const tags=[...new Set(state.notes.flatMap(n=>n.tags||[]))].sort(); for(const t of tags){const o=document.createElement('option'); o.value=t; o.textContent='#'+t; els.tag.appendChild(o)}
        load();

        [els.q,els.folder,els.tag,els.sort].forEach(i=>i.addEventListener('input',()=>{renderList();save()}));
        els.font.addEventListener('input',()=>setReaderFont(Number(els.font.value)||17));
        els.views.querySelectorAll('.viewBtn').forEach(b=>b.onclick=()=>applyView(b.dataset.view));
        els.tabList.onclick=()=>setMobileTab('list'); els.tabRead.onclick=()=>setMobileTab('read'); els.fabTop.onclick=()=>setMobileTab('list');
        els.prev.onclick=()=>move(-1); els.next.onclick=()=>move(1);
        els.fav.onclick=()=>{if(!state.selected)return; state.favorites[state.selected]=!state.favorites[state.selected]; renderList(); openNote(state.selected,false); save();};
        els.focus.onclick=()=>setFocus(!state.focus);
        els.copyLink.onclick=async()=>{if(!state.selected)return; const url=location.origin+location.pathname+'#'+state.selected; try{await navigator.clipboard.writeText(url); els.copyLink.textContent='Skopiowano'; setTimeout(()=>els.copyLink.textContent='Kopiuj link',1200);}catch{}};

        let startX=0; els.readPane.addEventListener('touchstart',e=>startX=e.changedTouches[0].clientX,{passive:true}); els.readPane.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-startX; if(Math.abs(dx)>70){if(dx<0)move(1); else move(-1);}});
        window.addEventListener('resize',()=>{if(!isMobile()){els.listPane.classList.remove('hidden'); els.readPane.classList.remove('hidden')} else if(!state.focus) setMobileTab('list')});

        bindReaderProgress();
        renderCategories();
        if(state.view&&state.view!=='custom') applyView(state.view); else {renderViews(); renderList();}
        if(location.hash){const id=location.hash.slice(1); if(state.notes.some(n=>n.id===id)) openNote(id,false);} else if(state.selected){openNote(state.selected,false)}
        setReaderFont(Number(els.font.value)||17);
        setFocus(state.focus);
        if(isMobile()&&!state.focus) setMobileTab('list');
      }
      // Defensive anti-horizontal-scroll guard for iOS Safari
      function clampHorizontal(){
        const overflow = document.documentElement.scrollWidth - window.innerWidth;
        if(overflow > 0){
          document.body.style.overflowX = 'hidden';
          document.documentElement.style.overflowX = 'hidden';
        }
      }
      window.addEventListener('resize', clampHorizontal, {passive:true});
      window.addEventListener('orientationchange', clampHorizontal, {passive:true});
      setTimeout(clampHorizontal, 50);
      setInterval(clampHorizontal, 1200);

      boot();
    </script>
  </body>
</html>
