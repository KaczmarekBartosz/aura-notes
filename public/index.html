<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Aura Notes</title>
    <style>
      :root{
        --bg:#f6f6f6; --bg2:#ffffff; --text:#111; --muted:#666; --line:#e7e7e7;
        --chip:#f0f0f0; --chipOn:#111; --chipOnText:#fff; --card:#fff;
      }
      *{box-sizing:border-box;min-width:0}
      html,body{margin:0;max-width:100%;overflow-x:hidden}
      body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg2),var(--bg))}

      .app{max-width:1180px;margin:0 auto;padding:12px}
      .app.is-locked{pointer-events:none;filter:blur(2px)}

      .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
      .title{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:0}
      .pill{font-size:12px;padding:7px 11px;border:1px solid var(--line);background:var(--chip);border-radius:999px;color:#3d3d3d}
      .btn-login{border:0;background:#111;color:#fff}

      .kpi{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:10px}
      .k{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px}
      .k .v{font-size:22px;font-weight:700;line-height:1.1}
      .k .l{font-size:12px;color:var(--muted)}

      .modes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px}
      .mode{padding:10px 12px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-size:13px;text-align:center;cursor:pointer}
      .mode.on{background:var(--chipOn);color:var(--chipOnText);border-color:#111;font-weight:700}

      .tabs{display:flex;gap:8px;margin-bottom:10px}
      .tab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--line);background:var(--chip);font-weight:700}
      .tab.on{background:#111;color:#fff;border-color:#111}

      .layout{display:grid;grid-template-columns:1fr;gap:10px}
      .pane{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:10px}

      .filters{display:grid;gap:8px;position:sticky;top:0;z-index:2;background:#fff;padding-bottom:8px;border-bottom:1px solid var(--line)}
      .f2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
      input,select,button{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:16px;color:#111}

      .cards{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;max-height:54vh;overflow-y:auto;overflow-x:hidden;padding-right:2px;max-width:100%;scroll-behavior:smooth}
      .note{display:grid;grid-template-columns:56px 1fr;gap:10px;padding:10px;border:1px solid var(--line);border-radius:16px;background:#fff;cursor:pointer;max-width:100%;overflow:hidden}
      .note.active{outline:2px solid #111;outline-offset:0}
      .thumb{width:56px;height:56px;border-radius:12px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(160deg,#fafafa,#efefef)}
      .nt{font-size:15px;font-weight:650;line-height:1.25;word-break:break-word;overflow-wrap:anywhere}
      .nx{margin-top:4px;font-size:12px;color:var(--muted);word-break:break-word;overflow-wrap:anywhere}
      .nm{margin-top:6px;font-size:11px;color:var(--muted);word-break:break-word;overflow-wrap:anywhere}

      .sectionHead{font-size:12px;color:#666;margin:8px 2px 2px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
      .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
      .tag{font-size:10px;padding:2px 7px;border-radius:999px;background:#f4f4f4;border:1px solid var(--line);color:#555}
      .empty{padding:14px;border:1px dashed #ccc;border-radius:14px;text-align:center;color:#666;background:#fafafa}

      .reader{padding:0;max-height:70vh;overflow:auto}
      .readerTop{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:10px;display:flex;gap:8px;flex-wrap:wrap;z-index:3}
      .readerTop button{width:auto;padding:8px 10px;font-size:13px}
      .meta{font-size:12px;color:var(--muted);padding:0 14px}
      .content{padding:10px 14px 20px;font-size:17px;line-height:1.65;word-break:break-word;overflow-wrap:anywhere}
      .content pre{overflow:auto;background:#f3f3f3;border-radius:10px;padding:10px}
      .content code{background:#f3f3f3;padding:2px 6px;border-radius:6px}
      .content blockquote{border-left:3px solid #cfcfcf;padding-left:10px;color:#4e4e4e}

      .hidden{display:none!important}
      .mobileOnly{display:block}

      .lock{position:fixed;inset:0;background:#f6f6f6f2;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:99999;padding:16px;min-height:100dvh}
      .lockCard{width:min(420px,100%);background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}

      .reading-fullscreen .top,.reading-fullscreen .kpi,.reading-fullscreen .modes,.reading-fullscreen .tabs,.reading-fullscreen #listPane{display:none!important}
      .reading-fullscreen #readPane{position:fixed;inset:0;z-index:9999;max-height:100dvh;height:100dvh;border-radius:0}
      .reading-fullscreen .app{padding:0;max-width:none}

      @media (min-width:1000px){
        .mobileOnly{display:none}
        .kpi{grid-template-columns:repeat(4,minmax(0,1fr))}
        .modes{grid-template-columns:repeat(8,minmax(0,1fr))}
        .layout{grid-template-columns:430px 1fr}
        .cards{max-height:74vh}
        .reader{max-height:82vh}
      }
    </style>
  </head>
  <body>
    <div id="lock" class="lock hidden" role="dialog" aria-modal="true">
      <div class="lockCard">
        <h2 style="margin:0 0 8px">Aura Notes — logowanie</h2>
        <p style="margin:0 0 10px;color:#666">Wpisz hasło i kliknij Odblokuj.</p>
        <input id="pw" type="password" placeholder="Hasło" />
        <div style="height:8px"></div>
        <button id="unlock" type="button" style="background:#111;color:#fff;border-color:#111">Odblokuj</button>
        <p id="pwErr" style="display:none;color:#c83a3a;font-size:12px">Błąd logowania</p>
        <p id="loginStatus" style="display:none;color:#666;font-size:12px">Sprawdzam...</p>
      </div>
    </div>

    <div id="appRoot" class="app">
      <div class="top">
        <h1 class="title">Aura Notes</h1>
        <span id="latest" class="pill">Najnowsza aktualizacja: —</span>
        <button id="loginBtn" class="pill btn-login">Zaloguj</button>
      </div>

      <section class="kpi">
        <div class="k"><div id="kAll" class="v">0</div><div class="l">Wszystkie notatki</div></div>
        <div class="k"><div id="kNew" class="v">0</div><div class="l">Nowe od wizyty</div></div>
        <div class="k"><div id="kGold" class="v">0</div><div class="l">Protokoły GOLD</div></div>
        <div class="k"><div id="kFav" class="v">0</div><div class="l">Ulubione</div></div>
      </section>

      <section id="modes" class="modes"></section>

      <div class="tabs mobileOnly">
        <button id="tabList" class="tab on">Lista</button>
        <button id="tabRead" class="tab">Czytnik</button>
      </div>

      <main class="layout">
        <section id="listPane" class="pane">
          <div class="filters">
            <input id="q" placeholder="Szukaj np. retatrutide, protocol, taste..." />
            <div class="f2">
              <select id="folder"><option value="">Folder: wszystkie</option><option value="memory">memory</option><option value="outputs">outputs</option></select>
              <select id="sort"><option value="new">Sort: najnowsze</option><option value="old">Sort: najstarsze</option><option value="az">Sort: A-Z</option></select>
            </div>
          </div>
          <div id="cards" class="cards"></div>
        </section>

        <section id="readPane" class="pane reader">
          <div class="readerTop">
            <button id="prev">◀</button>
            <button id="next">▶</button>
            <button id="fav">☆ Ulubione</button>
            <button id="focus">Focus</button>
            <button id="fsBtn">Fullscreen</button>
            <button id="copyLink">Kopiuj link</button>
            <span id="readMin" class="pill">—</span>
          </div>
          <div id="meta" class="meta" style="padding-top:8px">Wybierz notatkę.</div>
          <article id="content" class="content"></article>
        </section>
      </main>
    </div>


    <script>
      const MODES = [
        { id:'all', label:'Wszystko' },
        { id:'gold', label:'Protokoły GOLD' },
        { id:'fitness', label:'Fitness/Peptydy' },
        { id:'taste', label:'Taste' },
        { id:'cron', label:'Cron' },
        { id:'daily', label:'Daily' },
        { id:'recent', label:'Ostatnie 7 dni' },
        { id:'fav', label:'Ulubione' },
        { id:'unread', label:'Nieprzeczytane' },
      ];

      const ICON = {
        'golden-protocols':'🏆', 'fitness-health':'💪', taste:'🧠', 'cron-sync':'🕒', 'daily-log':'📝', other:'📄'
      };

      const state = {
        notes: [], filtered: [], selected: null,
        mode: 'all', folder: '', q: '', sort: 'new',
        favorites: {}, readMap: {}, authPass: localStorage.getItem('aura_auth_pass') || '', listScroll:0, readScroll:0
      };

      const $ = (id) => document.getElementById(id);
      const els = {
        appRoot:$('appRoot'), lock:$('lock'), pw:$('pw'), unlock:$('unlock'), pwErr:$('pwErr'), loginStatus:$('loginStatus'), loginBtn:$('loginBtn'),
        latest:$('latest'), modes:$('modes'), tabList:$('tabList'), tabRead:$('tabRead'),
        listPane:$('listPane'), readPane:$('readPane'), q:$('q'), folder:$('folder'), sort:$('sort'), cards:$('cards'),
        prev:$('prev'), next:$('next'), fav:$('fav'), focus:$('focus'), fsBtn:$('fsBtn'), copyLink:$('copyLink'), readMin:$('readMin'), meta:$('meta'), content:$('content'),
        kAll:$('kAll'), kNew:$('kNew'), kGold:$('kGold'), kFav:$('kFav')
      };

      const fmt = d => new Date(d).toLocaleString('pl-PL',{dateStyle:'short',timeStyle:'short'});
      const isMobile = () => window.matchMedia('(max-width: 999px)').matches;
      const daysAgo = n => new Date(Date.now() - n*86400000);

      function save() {
        localStorage.setItem('aura_notes_state', JSON.stringify({ mode:state.mode, folder:state.folder, q:state.q, sort:state.sort, selected:state.selected, favorites:state.favorites, readMap:state.readMap, listScroll:state.listScroll, readScroll:state.readScroll }));
      }

      function load() {
        try {
          const s = JSON.parse(localStorage.getItem('aura_notes_state') || '{}');
          state.mode = s.mode || state.mode;
          state.folder = s.folder || '';
          state.q = s.q || '';
          state.sort = s.sort || 'new';
          state.selected = s.selected || null;
          state.favorites = s.favorites || {};
          state.readMap = s.readMap || {};
          state.listScroll = s.listScroll || 0;
          state.readScroll = s.readScroll || 0;
          els.q.value = state.q;
          els.folder.value = state.folder;
          els.sort.value = state.sort;
        } catch {}
      }

      function showLogin(msg='') {
        els.lock.classList.remove('hidden');
        els.appRoot.classList.add('is-locked');
        els.pwErr.style.display = msg ? 'block' : 'none';
        els.pwErr.textContent = msg || '';
        els.loginStatus.style.display = 'none';
      }

      function hideLogin() {
        els.lock.classList.add('hidden');
        els.appRoot.classList.remove('is-locked');
        els.pwErr.style.display = 'none';
        els.loginStatus.style.display = 'none';
      }

      async function fetchNotes(password='') {
        try {
          const res = await fetch('/.netlify/functions/notes?v=4', {
            cache:'no-store', credentials:'include',
            headers: { 'x-aura-pass': (password || state.authPass || '') }
          });
          const payload = await res.json().catch(() => ({}));
          if (res.status === 401) return { authRequired:true };
          if (!res.ok || !payload.ok) return { authRequired:false, error: (payload.error || ('HTTP ' + res.status)) + (payload.detail?(' — '+payload.detail):'') };
          return { authRequired:false, data: payload.data };
        } catch {
          return { authRequired:false, error:'Network error' };
        }
      }

      async function loginAndLoad() {
        els.loginStatus.style.display = 'block';
        els.loginStatus.textContent = 'Sprawdzam hasło...';
        els.unlock.disabled = true;
        const pw = els.pw.value || '';
        if (!pw) { showLogin('Wpisz hasło.'); els.unlock.disabled=false; return; }

        state.authPass = pw;
        localStorage.setItem('aura_auth_pass', pw);

        const result = await fetchNotes(pw);
        els.unlock.disabled = false;

        if (!result.data) {
          showLogin(result.authRequired ? 'Nieprawidłowe hasło.' : ('Logowanie nieudane: ' + (result.error || 'spróbuj ponownie')));
          return;
        }

        hideLogin();
        startApp(result.data);
      }

      function modePredicate(n) {
        const blob = (n.title + ' ' + n.path + ' ' + (n.excerpt||'') + ' ' + (n.tags||[]).join(' ') + ' ' + (n.category||'')).toLowerCase();
        switch(state.mode){
          case 'gold': return n.category === 'golden-protocols' || /gold|protocol/.test(blob);
          case 'fitness': return /fitness|peptyd|peptide|workout|nutrition|retatrutide|mots-c|hcg|cjc|ipamorelin/.test(blob);
          case 'taste': return n.category === 'taste' || /taste|design|ui|ux/.test(blob);
          case 'cron': return n.category === 'cron-sync' || /cron|sync|bookmark/.test(blob);
          case 'daily': return n.category === 'daily-log';
          case 'recent': return new Date(n.updatedAt) >= daysAgo(7);
          case 'fav': return !!state.favorites[n.id];
          case 'unread': return !state.readMap[n.id];
          default: return true;
        }
      }

      function renderModes(){
        els.modes.innerHTML = MODES.map(m => `<button class="mode ${state.mode===m.id?'on':''}" data-mode="${m.id}">${m.label}</button>`).join('');
        els.modes.querySelectorAll('.mode').forEach(b => b.onclick = () => { state.mode=b.dataset.mode; state.selected=null; renderModes(); renderList(); save(); });
      }

      function renderList(){
        const q = (els.q.value || '').trim().toLowerCase();
        const folder = els.folder.value;
        state.filtered = state.notes.filter(n => {
          if (!modePredicate(n)) return false;
          if (folder && n.folder !== folder) return false;
          if (!q) return true;
          const blob = (n.title+' '+n.path+' '+(n.excerpt||'')+' '+(n.content||'').slice(0,700)).toLowerCase();
          return blob.includes(q);
        });

        if (els.sort.value==='new') state.filtered.sort((a,b)=>a.updatedAt<b.updatedAt?1:-1);
        if (els.sort.value==='old') state.filtered.sort((a,b)=>a.updatedAt>b.updatedAt?1:-1);
        if (els.sort.value==='az') state.filtered.sort((a,b)=>a.title.localeCompare(b.title,'pl'));

        const groups={today:[],week:[],older:[]};
        const now=Date.now();
        for(const n of state.filtered){
          const age=(now-new Date(n.updatedAt).getTime())/86400000;
          if(age<1) groups.today.push(n); else if(age<7) groups.week.push(n); else groups.older.push(n);
        }

        function card(n){
          const tags=(n.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
          return `<article class="note ${state.selected===n.id?'active':''}" data-id="${n.id}">
            <div class="thumb">${ICON[n.category] || '📄'}</div>
            <div>
              <div class="nt">${n.title}</div>
              <div class="nx">${n.excerpt || ''}</div>
              <div class="tags">${tags}</div>
              <div class="nm">${n.path} • ${fmt(n.updatedAt)} • ${n.readingMinutes||1} min ${state.readMap[n.id]?'• przeczytane':''}</div>
            </div>
          </article>`;
        }

        let html='';
        if(groups.today.length){ html += `<div class="sectionHead">Dziś</div>` + groups.today.map(card).join(''); }
        if(groups.week.length){ html += `<div class="sectionHead">Ten tydzień</div>` + groups.week.map(card).join(''); }
        if(groups.older.length){ html += `<div class="sectionHead">Starsze</div>` + groups.older.map(card).join(''); }

        if(!html){
          html = `<div class="empty">Brak wyników. <br><button id="clearFilters" style="margin-top:8px;width:auto">Wyczyść filtry</button></div>`;
        }

        els.cards.innerHTML = html;
        els.cards.querySelectorAll('.note').forEach(c => c.onclick = () => openNote(c.dataset.id, true));
        const cf= document.getElementById('clearFilters');
        if(cf) cf.onclick=()=>{ state.mode='all'; els.q.value=''; els.folder.value=''; els.sort.value='new'; renderModes(); renderList(); save(); };

        if (state.filtered.length && !state.selected) openNote(state.filtered[0].id, false);
        updateKpi();
      }

      function mdToHtml(md){
        const esc = (s) => s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
        let t = esc(md || '');
        t=t.replace(/^###\s(.+)$/gm,'<h3>$1</h3>').replace(/^##\s(.+)$/gm,'<h2>$1</h2>').replace(/^#\s(.+)$/gm,'<h1>$1</h1>');
        t=t.replace(/^>\s(.+)$/gm,'<blockquote>$1</blockquote>');
        t=t.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
        t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
        t=t.replace(/\[([^\]]+)\]\((https?:[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
        t=t.replace(/^(\-\s.+(?:\n\-\s.+)*)/gm,m=>'<ul>'+m.split('\n').map(x=>'<li>'+x.replace(/^\-\s/,'')+'</li>').join('')+'</ul>');
        t=t.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
        return '<p>'+t+'</p>';
      }

      function openNote(id, switchMobile){
        const n = state.notes.find(x=>x.id===id); if(!n) return;
        state.selected = n.id;
        location.hash = n.id;
        els.meta.textContent = `${n.path} • ${fmt(n.updatedAt)} • ${n.words||0} słów`;
        els.readMin.textContent = `${n.readingMinutes||1} min`;
        els.content.innerHTML = mdToHtml(n.content);
        els.fav.textContent = state.favorites[n.id] ? '★ Ulubione' : '☆ Ulubione';
        state.readMap[n.id] = Date.now();
        if (isMobile() && switchMobile) setMobileTab('read');
        renderList();
        save();
      }

      function move(delta){
        if(!state.filtered.length) return;
        const i = state.filtered.findIndex(n=>n.id===state.selected);
        const ni = Math.max(0, Math.min(state.filtered.length-1, (i<0?0:i)+delta));
        openNote(state.filtered[ni].id, false);
      }

      function updateKpi(){
        const lastSeen = localStorage.getItem('aura_last_seen');
        const newCount = state.notes.filter(n=>!lastSeen || new Date(n.updatedAt)>new Date(lastSeen)).length;
        els.kAll.textContent = String(state.notes.length);
        els.kNew.textContent = String(newCount);
        els.kGold.textContent = String(state.notes.filter(n=>n.category==='golden-protocols').length);
        els.kFav.textContent = String(Object.keys(state.favorites).filter(k=>state.favorites[k]).length);
        localStorage.setItem('aura_last_seen', new Date().toISOString());
      }

      function setMobileTab(tab){
        if(!isMobile()) return;
        const listOn = tab==='list';
        els.tabList.classList.toggle('on', listOn);
        els.tabRead.classList.toggle('on', !listOn);
        els.listPane.classList.toggle('hidden', !listOn);
        els.readPane.classList.toggle('hidden', listOn);
      }

      function setFocus(on){
        els.listPane.classList.toggle('hidden', on);
        els.focus.textContent = on ? 'Wyłącz focus' : 'Focus';
      }

      function toggleFullscreenReader(){
        const on = document.body.classList.toggle('reading-fullscreen');
        els.fsBtn.textContent = on ? 'Wyjdz fullscreen' : 'Fullscreen';
      }

      function debounce(fn,ms=200){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

      function bind(){
        els.q.addEventListener('input', debounce(()=>{ state.q=els.q.value; renderList(); save(); },180));
        els.folder.addEventListener('input', ()=>{ state.folder=els.folder.value; renderList(); save(); });
        els.sort.addEventListener('input', ()=>{ state.sort=els.sort.value; renderList(); save(); });

        els.cards.addEventListener('scroll', ()=>{ state.listScroll = els.cards.scrollTop; }, {passive:true});
        els.readPane.addEventListener('scroll', ()=>{ state.readScroll = els.readPane.scrollTop; }, {passive:true});

        els.prev.onclick=()=>move(-1);
        els.next.onclick=()=>move(1);
        els.focus.onclick=()=>setFocus(els.focus.textContent==='Focus');
        els.fsBtn.onclick=()=>toggleFullscreenReader();
        els.copyLink.onclick=async()=>{ if(!state.selected)return; const url=location.origin+location.pathname+'#'+state.selected; try{await navigator.clipboard.writeText(url); els.copyLink.textContent='Skopiowano'; setTimeout(()=>els.copyLink.textContent='Kopiuj link',1200);}catch{} };
        els.fav.onclick=()=>{ if(!state.selected)return; state.favorites[state.selected]=!state.favorites[state.selected]; openNote(state.selected,false); save(); };

        els.tabList.onclick=()=>setMobileTab('list');
        els.tabRead.onclick=()=>setMobileTab('read');

        els.loginBtn.onclick=()=>{ showLogin(); els.unlock.onclick=loginAndLoad; setTimeout(()=>els.pw.focus(),50); };
        els.unlock.onclick=loginAndLoad;

        let sx=0;
        els.readPane.addEventListener('touchstart',e=>sx=e.changedTouches[0].clientX,{passive:true});
        els.readPane.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>70){ if(dx<0) move(1); else move(-1); }});

        window.addEventListener('resize',()=>{ if(!isMobile()){ els.listPane.classList.remove('hidden'); els.readPane.classList.remove('hidden'); } else setMobileTab('list'); });

        document.addEventListener('keydown',(e)=>{
          if(e.key==='/' && document.activeElement!==els.q){ e.preventDefault(); els.q.focus(); }
          if(e.key==='n') move(1);
          if(e.key==='p') move(-1);
        });
      }

      function startApp(data){
        state.notes = data.notes || [];
        els.latest.textContent = `Najnowsza aktualizacja: ${data.latestUpdatedAt ? fmt(data.latestUpdatedAt) : '—'}`;
        load();
        renderModes();
        renderList();

        if(location.hash){
          const id = location.hash.slice(1);
          if(state.notes.some(n=>n.id===id)) openNote(id, false);
        }

        if(isMobile()) setMobileTab('list');
        requestAnimationFrame(()=>{ els.cards.scrollTop = state.listScroll || 0; els.readPane.scrollTop = state.readScroll || 0; });
      }

      async function boot(){
        bind();
        const first = await fetchNotes(state.authPass || '');
        if(first.data){ hideLogin(); startApp(first.data); return; }
        showLogin('Wymagane logowanie.');
      }

      boot();
    </script>
  </body>
</html>
