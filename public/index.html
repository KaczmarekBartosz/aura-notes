<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Notes</title>
    <style>
      :root{--bg:#090d16;--card:#121826;--muted:#8ea0bf;--text:#e8eefc;--line:#1f2a44;--chip:#1a243b;--chipOn:#243a63}
      *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
      .wrap{max-width:1240px;margin:0 auto;padding:12px}
      .top{display:flex;gap:8px;align-items:center;margin-bottom:10px}
      .count{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--chip);border:1px solid #2b3f67}
      .grid{display:grid;grid-template-columns:1fr;gap:12px}
      .card{background:var(--card);border:1px solid var(--line);border-radius:16px}
      .panel{padding:12px}
      input,select,button{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);background:#0f1524;color:var(--text);font-size:15px}
      .chips{display:flex;gap:8px;overflow:auto;padding-bottom:4px}
      .chip{white-space:nowrap;padding:8px 12px;border-radius:999px;border:1px solid #2d4270;background:var(--chip);color:#bdd5ff;font-size:12px;cursor:pointer}
      .chip.on{background:var(--chipOn);border-color:#4367a8}
      .list{max-height:46vh;overflow:auto;border-top:1px solid var(--line);margin-top:10px}
      .item{padding:10px;border-bottom:1px solid var(--line);cursor:pointer}
      .item.active{background:#101d34}
      .item h4{margin:0 0 4px;font-size:14px}.item p{margin:0;color:var(--muted);font-size:12px}
      .meta{font-size:11px;color:var(--muted);margin-top:6px}
      .viewer{padding:14px;max-height:42vh;overflow:auto}
      .viewer pre{white-space:pre-wrap;line-height:1.45;font-size:14px}
      .lock{position:fixed;inset:0;background:#06090f;display:flex;align-items:center;justify-content:center;padding:16px}
      .hidden{display:none}
      @media (min-width: 980px){
        .grid{grid-template-columns:390px 1fr}
        .list{max-height:72vh}
        .viewer{max-height:78vh}
      }
    </style>
  </head>
  <body>
    <div id="lock" class="lock hidden">
      <div class="card panel" style="width:min(420px,100%)">
        <h2 style="margin:0 0 8px">Aura Notes — prywatny dostęp</h2>
        <p style="color:var(--muted);margin-top:0">Podaj hasło, żeby odblokować notatnik.</p>
        <input id="pw" type="password" placeholder="Hasło" />
        <div style="height:8px"></div>
        <button id="unlock">Odblokuj</button>
        <p id="pwErr" style="color:#fca5a5;font-size:12px;display:none">Nieprawidłowe hasło.</p>
      </div>
    </div>

    <div class="wrap">
      <div class="top">
        <h1 style="margin:0;font-size:20px">Aura Notes</h1>
        <span id="count" class="count">0 notatek</span>
      </div>

      <div class="chips" id="categories"></div>

      <div class="grid">
        <section class="card panel">
          <input id="q" placeholder="Szukaj: gold, peptydy, taste, cron..." />
          <div style="height:8px"></div>
          <select id="folder">
            <option value="">Wszystkie foldery</option>
            <option value="memory">memory</option>
            <option value="outputs">outputs</option>
          </select>
          <div style="height:8px"></div>
          <select id="tag"><option value="">Wszystkie tagi</option></select>
          <div class="list" id="list"></div>
        </section>

        <section class="card viewer">
          <div id="meta" class="meta">Wybierz notatkę z lewej.</div>
          <pre id="content" style="margin-top:10px"></pre>
        </section>
      </div>
    </div>

    <script>
      const CAT = {
        all: 'Wszystko',
        'golden-protocols': 'Golden Protocols',
        'fitness-health': 'Fitness / Health',
        taste: 'Taste',
        'cron-sync': 'Cron / Sync',
        'daily-log': 'Daily log',
        other: 'Inne'
      };

      const state = {notes:[], filtered:[], selected:null, category:'golden-protocols', auth:{enabled:false, sha256:null}};
      const els = {
        list: document.getElementById('list'), q: document.getElementById('q'), folder: document.getElementById('folder'),
        tag: document.getElementById('tag'), content: document.getElementById('content'), meta: document.getElementById('meta'),
        count: document.getElementById('count'), lock: document.getElementById('lock'), unlock: document.getElementById('unlock'),
        pw: document.getElementById('pw'), pwErr: document.getElementById('pwErr'), categories: document.getElementById('categories')
      };

      const fmt = d => new Date(d).toLocaleString('pl-PL', {dateStyle:'short', timeStyle:'short'});

      async function sha256(text){
        const data = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,'0')).join('');
      }

      function renderCategories(){
        const available = new Set(state.notes.map(n => n.category));
        const order = ['all','golden-protocols','fitness-health','taste','cron-sync','daily-log','other'];
        els.categories.innerHTML = order
          .filter(c => c === 'all' || available.has(c))
          .map(c => `<button class="chip ${state.category===c?'on':''}" data-cat="${c}">${CAT[c] || c}</button>`).join('');
        els.categories.querySelectorAll('.chip').forEach(b => {
          b.onclick = () => { state.category = b.dataset.cat; state.selected = null; renderList(); renderCategories(); };
        });
      }

      function renderList(){
        const q = els.q.value.trim().toLowerCase();
        const folder = els.folder.value;
        const tag = els.tag.value;
        state.filtered = state.notes.filter(n => {
          if(state.category !== 'all' && n.category !== state.category) return false;
          if(folder && n.folder !== folder) return false;
          if(tag && !(n.tags||[]).includes(tag)) return false;
          if(!q) return true;
          return (n.title + ' ' + n.path + ' ' + (n.excerpt||'') + ' ' + (n.tags||[]).join(' ') + ' ' + (n.category||'')).toLowerCase().includes(q);
        });

        els.list.innerHTML = state.filtered.map(n => `
          <div class="item ${state.selected===n.id?'active':''}" data-id="${n.id}">
            <h4>${n.title}</h4>
            <p>${n.excerpt || ''}</p>
            <div class="meta">${n.path} • ${fmt(n.updatedAt)} • ${CAT[n.category] || n.category}</div>
          </div>
        `).join('');
        els.count.textContent = `${state.filtered.length} / ${state.notes.length} notatek`;

        els.list.querySelectorAll('.item').forEach(el => el.onclick = () => openNote(el.dataset.id));
        if(state.filtered.length && !state.selected) openNote(state.filtered[0].id);
        if(!state.filtered.length){
          els.meta.textContent = 'Brak wyników dla aktualnych filtrów.';
          els.content.textContent = '';
        }
      }

      function openNote(id){
        const n = state.notes.find(x => x.id === id); if(!n) return;
        state.selected = n.id;
        els.meta.textContent = `${n.path} • ${fmt(n.updatedAt)} • ${CAT[n.category] || n.category}${(n.tags||[]).length ? ' • #' + n.tags.join(' #') : ''}`;
        els.content.textContent = n.content;
        renderList();
      }

      async function boot(){
        const res = await fetch('./notes-index.json', {cache:'no-store'});
        const data = await res.json();
        state.auth = data.auth || {enabled:false};

        if(state.auth.enabled){
          els.lock.classList.remove('hidden');
          els.unlock.onclick = async () => {
            const attempt = await sha256(els.pw.value);
            if(attempt === state.auth.sha256){
              sessionStorage.setItem('aura_ok', '1');
              els.lock.classList.add('hidden');
            } else {
              els.pwErr.style.display = 'block';
            }
          };
          if(sessionStorage.getItem('aura_ok') === '1') els.lock.classList.add('hidden');
        }

        state.notes = data.notes || [];

        const tags = [...new Set(state.notes.flatMap(n => n.tags || []))].sort();
        for(const t of tags){
          const o = document.createElement('option'); o.value = t; o.textContent = `#${t}`; els.tag.appendChild(o);
        }

        [els.q, els.folder, els.tag].forEach(el => el.addEventListener('input', renderList));
        renderCategories();
        renderList();
      }
      boot();
    </script>
  </body>
</html>
